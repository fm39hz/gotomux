name: release

# Tag → GitHub Release with static binaries + checksums.
#   git tag v0.1.0 && git push origin v0.1.0
#
# Install for users without Go:
#   download gotomux_<ver>_linux_amd64.tar.gz from the release, extract, put on PATH

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: test
        run: go test ./... -count=1 -short

      - name: version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: build
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/release
          ldflags="-s -w -X main.version=${VERSION}"
          # linux + darwin, amd64 + arm64 — covers almost everyone who would grab a binary
          for os in linux darwin; do
            for arch in amd64 arm64; do
              out="gotomux_${VERSION}_${os}_${arch}"
              echo "→ $out"
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
                go build -trimpath -ldflags="$ldflags" -o "dist/release/gotomux" .
              tar -C dist/release -czf "dist/release/${out}.tar.gz" gotomux
              rm -f dist/release/gotomux
            done
          done
          # windows users exist; keep zip for them
          for arch in amd64 arm64; do
            out="gotomux_${VERSION}_windows_${arch}"
            echo "→ $out"
            CGO_ENABLED=0 GOOS=windows GOARCH=$arch \
              go build -trimpath -ldflags="$ldflags" -o "dist/release/gotomux.exe" .
            (cd dist/release && zip -q "${out}.zip" gotomux.exe)
            rm -f dist/release/gotomux.exe
          done
          (cd dist/release && sha256sum * > checksums.txt)
          ls -lh dist/release

      - name: publish
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/release/*
